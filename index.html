<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歩数アプリ（スマホ最適化版）</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:10px;
  text-align:center;
}

/* セクションカード */
.card{
  background:white;
  border-radius:16px;
  padding:15px;
  margin:10px auto;
  max-width:420px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* ボタン */
.button-group{
  display:flex;
  flex-direction:column;
  gap:10px;
}

button{
  width:100%;
  font-size:18px;
  padding:14px;
  border:none;
  border-radius:12px;
  color:white;
}

#startBtn{background:#4CAF50;}
#stopBtn{background:#f44336;}
#weekBtn{background:#2196F3;}
#calorieBtn{background:#ff9800;}

/* ドーナツ中央テキスト */
.donut-wrapper{
  position:relative;
  width:220px;
  margin:0 auto;
}

.center-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:18px;
  font-weight:bold;
}

/* グラフ */
canvas{
  width:100% !important;
  height:250px !important;
}

#remaining{
  margin-top:10px;
  font-size:18px;
}
</style>
</head>

<body>

<h2>🚶 歩数アプリ</h2>

<div class="card">
  <div class="button-group">
    <button id="startBtn">計測開始</button>
    <button id="stopBtn">計測停止</button>
  </div>
</div>

<div class="card">
  <h3>今日の進捗</h3>

  <div class="donut-wrapper">
    <canvas id="donutChart"></canvas>
    <div class="center-text" id="centerText">0歩</div>
  </div>

  <div id="remaining"></div>
</div>

<div class="card">
  <div class="button-group">
    <button id="weekBtn">週の歩数</button>
    <button id="calorieBtn">消費カロリー</button>
  </div>

  <canvas id="mainChart"></canvas>
</div>

<script>
const DAILY_GOAL = 9000;
const CAL_PER_STEP = 0.04;

let steps = 0;
let walking = false;
let lastStepTime = 0;

const STEP_THRESHOLD = 12;
const STEP_INTERVAL = 300;

function todayKey(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');
}

function getWeek(){
  const t=new Date();
  const day=t.getDay();
  const diff=day===0?-6:1-day;
  const mon=new Date(t);
  mon.setDate(t.getDate()+diff);

  let arr=[];
  for(let i=0;i<7;i++){
    const d=new Date(mon);
    d.setDate(mon.getDate()+i);
    arr.push(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0'));
  }
  return arr;
}

let data=JSON.parse(localStorage.getItem("steps"))||{};
const today=todayKey();
if(!data[today]) data[today]=0;

// ドーナツ
const donut=new Chart(document.getElementById("donutChart"),{
  type:"doughnut",
  data:{
    labels:["歩数","残り"],
    datasets:[{
      data:[0,DAILY_GOAL],
      backgroundColor:["#4CAF50","#ddd"]
    }]
  },
  options:{
    cutout:"70%",
    plugins:{legend:{display:false}}
  }
});

function updateDonut(){
  const s=data[today];
  const rem=Math.max(DAILY_GOAL-s,0);

  donut.data.datasets[0].data=[Math.min(s,DAILY_GOAL),rem];
  donut.update();

  document.getElementById("centerText").innerText=s+"歩";
  document.getElementById("remaining").innerHTML=
    `あと ${rem} 歩`;
}

// メイングラフ
const main=new Chart(document.getElementById("mainChart"),{
  type:"bar",
  data:{labels:[],datasets:[{data:[]}]},
  options:{scales:{y:{beginAtZero:true}}}
});

function showSteps(){
  const w=getWeek();
  main.data.labels=w.map(d=>d.slice(5));
  main.data.datasets[0].label="歩数";
  main.data.datasets[0].data=w.map(d=>data[d]||0);
  main.update();
}

function showCalories(){
  const w=getWeek();
  main.data.labels=w.map(d=>d.slice(5));
  main.data.datasets[0].label="カロリー";
  main.data.datasets[0].data=w.map(d=>(data[d]||0)*CAL_PER_STEP);
  main.update();
}

showSteps();
updateDonut();

// ボタン
document.getElementById("weekBtn").onclick=showSteps;
document.getElementById("calorieBtn").onclick=showCalories;

document.getElementById("startBtn").onclick=async()=>{
  walking=true;
  steps=0;

  if(typeof DeviceMotionEvent!=='undefined' &&
     typeof DeviceMotionEvent.requestPermission==='function'){
    await DeviceMotionEvent.requestPermission();
  }
};

document.getElementById("stopBtn").onclick=()=>{
  walking=false;
  data[today]+=steps;
  localStorage.setItem("steps",JSON.stringify(data));
  updateDonut();
  showSteps();
};

window.addEventListener("devicemotion",(e)=>{
  if(!walking)return;
  const a=e.accelerationIncludingGravity;
  if(!a)return;

  const mag=Math.sqrt(a.x*a.x+a.y*a.y+a.z*a.z);
  const now=Date.now();

  if(mag>STEP_THRESHOLD && now-lastStepTime>STEP_INTERVAL){
    steps++;
    lastStepTime=now;
  }
});
</script>

</body>
</html>
