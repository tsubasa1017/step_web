<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>AI歩き方診断（週別グラフ版）</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    button {
      font-size: 22px;
      padding: 18px 40px;
      margin: 10px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
    }

    #startBtn { background: #4CAF50; color: white; }
    #stopBtn { background: #f44336; color: white; }

    #result, #analysis {
      font-size: 20px;
      margin-top: 15px;
    }

    .progress-container {
      width: 80%;
      height: 30px;
      background: #ddd;
      border-radius: 20px;
      margin: 20px auto;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #4CAF50;
      text-align: center;
      line-height: 30px;
      color: white;
      font-weight: bold;
      transition: width 0.3s;
    }

    canvas {
      margin-top: 30px;
      background: white;
      border-radius: 12px;
      padding: 10px;
    }
  </style>
</head>
<body>

  <h1>AI歩き方診断（週別表示）</h1>

  <button id="startBtn">計測開始</button>
  <button id="stopBtn">計測停止</button>

  <div id="result">今日の歩数：0歩</div>
  <div id="analysis"></div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar">0%</div>
  </div>

  <canvas id="stepChart" width="400" height="200"></canvas>

  <script>
    const DAILY_GOAL = 9000;

    let steps = 0;
    let walking = false;
    let lastStepTime = 0;
    let startTime = 0;
    let magnitudes = [];

    const STEP_THRESHOLD = 12;
    const STEP_INTERVAL = 300;

    function getTodayKey() {
      const today = new Date();
      return today.getFullYear() + "-" +
             String(today.getMonth()+1).padStart(2,'0') + "-" +
             String(today.getDate()).padStart(2,'0');
    }

    function getWeekKey(dateStr) {
      const date = new Date(dateStr);
      const firstDay = new Date(date.getFullYear(), 0, 1);
      const pastDays = (date - firstDay) / 86400000;
      const week = Math.ceil((pastDays + firstDay.getDay() + 1) / 7);
      return `${date.getFullYear()}-W${week}`;
    }

    let dailyData = JSON.parse(localStorage.getItem("dailySteps")) || {};
    const todayKey = getTodayKey();
    if (!dailyData[todayKey]) dailyData[todayKey] = 0;

    const resultDiv = document.getElementById("result");
    const analysisDiv = document.getElementById("analysis");
    const progressBar = document.getElementById("progressBar");

    function updateUI() {
      const todaySteps = dailyData[todayKey];
      resultDiv.innerText = `今日の歩数：${todaySteps}歩`;

      let percent = Math.min((todaySteps / DAILY_GOAL) * 100, 100);
      progressBar.style.width = percent + "%";
      progressBar.innerText = Math.floor(percent) + "%";
      progressBar.style.background = percent >= 100 ? "#2196F3" : "#4CAF50";
    }

    updateUI();

    function getWeeklyData() {
      let weekly = {};
      for (let date in dailyData) {
        let weekKey = getWeekKey(date);
        if (!weekly[weekKey]) weekly[weekKey] = 0;
        weekly[weekKey] += dailyData[date];
      }
      return weekly;
    }

    const ctx = document.getElementById('stepChart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: Object.keys(getWeeklyData()),
        datasets: [{
          label: '週別歩数',
          data: Object.values(getWeeklyData()),
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        scales: { y: { beginAtZero: true } }
      }
    });

    document.getElementById("startBtn").onclick = async () => {
      walking = true;
      steps = 0;
      magnitudes = [];
      startTime = Date.now();

      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        await DeviceMotionEvent.requestPermission();
      }

      resultDiv.innerText = "計測中...";
      analysisDiv.innerText = "";
    };

    document.getElementById("stopBtn").onclick = () => {
      walking = false;
      dailyData[todayKey] += steps;
      localStorage.setItem("dailySteps", JSON.stringify(dailyData));
      analyzeWalk();
      steps = 0;
      updateUI();
      updateGraph();
    };

    window.addEventListener("devicemotion", (event) => {
      if (!walking) return;
      const acc = event.accelerationIncludingGravity;
      if (!acc) return;
      const magnitude = Math.sqrt(acc.x*acc.x + acc.y*acc.y + acc.z*acc.z);
      magnitudes.push(magnitude);
      const now = Date.now();
      if (magnitude > STEP_THRESHOLD && now - lastStepTime > STEP_INTERVAL) {
        steps++;
        lastStepTime = now;
      }
    });

    function analyzeWalk() {
      const durationMin = (Date.now() - startTime) / 60000;
      const cadence = durationMin > 0 ? Math.round(steps / durationMin) : 0;
      let paceType = cadence < 90 ? "ゆっくり" : cadence < 120 ? "標準" : "速歩";
      const avg = magnitudes.reduce((a,b)=>a+b,0) / magnitudes.length;
      const variance = magnitudes.reduce((a,b)=>a+(b-avg)**2,0) / magnitudes.length;
      let stability = variance < 5 ? "とても安定" : variance < 15 ? "安定" : "やや不安定";
      analysisDiv.innerHTML = `歩行テンポ：${cadence} 歩/分（${paceType}）<br>歩行安定性：${stability}`;
    }

    function updateGraph() {
      const weekly = getWeeklyData();
      chart.data.labels = Object.keys(weekly);
      chart.data.datasets[0].data = Object.values(weekly);
      chart.update();
    }
  </script>

</body>
</html>
