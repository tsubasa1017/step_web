<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>AI歩き方診断 + グラフ</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    button {
      font-size: 20px;
      padding: 15px 30px;
      margin: 10px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
    }

    #startBtn { background: #4CAF50; color: white; }
    #stopBtn { background: #f44336; color: white; }

    #result {
      font-size: 22px;
      margin-top: 20px;
    }

    canvas {
      margin-top: 30px;
      background: white;
      border-radius: 12px;
      padding: 10px;
    }
  </style>
</head>
<body>

  <h1>AI歩き方診断</h1>

  <button id="startBtn">計測開始</button>
  <button id="stopBtn">計測停止</button>

  <div id="result">結果がここに表示されます</div>

  <canvas id="stepChart" width="400" height="200"></canvas>

  <script>
    let steps = 0;
    let walking = false;
    let stepHistory = JSON.parse(localStorage.getItem("stepHistory")) || [];

    const resultDiv = document.getElementById("result");

    const ctx = document.getElementById('stepChart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: stepHistory.map((_, i) => i + 1),
        datasets: [{
          label: '歩数推移',
          data: stepHistory,
          borderWidth: 2,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });

    document.getElementById("startBtn").onclick = () => {
      walking = true;
    };

    document.getElementById("stopBtn").onclick = () => {
      walking = false;
      diagnose();
      saveData();
      updateGraph();
    };

    function simulateStep() {
      if (walking) {
        steps += Math.floor(Math.random() * 3); // 疑似歩数
      }
      requestAnimationFrame(simulateStep);
    }

    function diagnose() {
      let message = "";
      if (steps < 50) {
        message = "運動不足タイプ";
      } else if (steps < 150) {
        message = "標準的な歩き方";
      } else {
        message = "アスリートタイプ";
      }

      resultDiv.innerText = `今回の歩数: ${steps}歩 → ${message}`;
      stepHistory.push(steps);
      steps = 0;
    }

    function saveData() {
      localStorage.setItem("stepHistory", JSON.stringify(stepHistory));
    }

    function updateGraph() {
      chart.data.labels = stepHistory.map((_, i) => i + 1);
      chart.data.datasets[0].data = stepHistory;
      chart.update();
    }

    simulateStep();
  </script>

</body>
</html>
