<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AI歩き方診断 完成版</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  text-align:center;
  background:#f5f5f5;
  margin:0;
  padding:20px;
}

button{
  font-size:16px;
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#startBtn{background:#4CAF50;color:white;}
#stopBtn{background:#f44336;color:white;}
#weekBtn{background:#2196F3;color:white;}
#calorieBtn{background:#ff9800;color:white;}

canvas{
  background:white;
  border-radius:12px;
  padding:10px;
  margin-top:20px;
}

#remaining{
  font-size:20px;
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>
<body>

<h1>AI歩き方診断</h1>

<button id="startBtn">計測開始</button>
<button id="stopBtn">計測停止</button>

<h2>🏠 今日の進捗</h2>
<canvas id="donutChart" width="250" height="250"></canvas>
<div id="remaining"></div>

<hr>

<button id="weekBtn">週の歩数</button>
<button id="calorieBtn">消費カロリー</button>

<canvas id="mainChart" width="400" height="200"></canvas>

<script>
const DAILY_GOAL = 9000;
const CALORIE_PER_STEP = 0.04;

let steps = 0;
let walking = false;
let lastStepTime = 0;
let startTime = 0;
let magnitudes = [];

const STEP_THRESHOLD = 12;
const STEP_INTERVAL = 300;

function getTodayKey(){
  const t=new Date();
  return t.getFullYear()+"-"+
  String(t.getMonth()+1).padStart(2,'0')+"-"+
  String(t.getDate()).padStart(2,'0');
}

function getThisWeekDates(){
  const today=new Date();
  const day=today.getDay();
  const diff=day===0?-6:1-day;
  const monday=new Date(today);
  monday.setDate(today.getDate()+diff);

  let arr=[];
  for(let i=0;i<7;i++){
    const d=new Date(monday);
    d.setDate(monday.getDate()+i);
    arr.push(d.getFullYear()+"-"+
      String(d.getMonth()+1).padStart(2,'0')+"-"+
      String(d.getDate()).padStart(2,'0'));
  }
  return arr;
}

let dailyData=JSON.parse(localStorage.getItem("dailySteps"))||{};
const todayKey=getTodayKey();
if(!dailyData[todayKey]) dailyData[todayKey]=0;

const remainingDiv=document.getElementById("remaining");


// 🔵 ドーナツグラフ
const donutCtx=document.getElementById("donutChart").getContext("2d");
const donutChart=new Chart(donutCtx,{
  type:"doughnut",
  data:{
    labels:["歩数","残り"],
    datasets:[{
      data:[0,DAILY_GOAL],
      backgroundColor:["#4CAF50","#ddd"]
    }]
  },
  options:{
    cutout:"70%",
    plugins:{legend:{display:false}}
  }
});

function updateDonut(){
  const todaySteps=dailyData[todayKey];
  const remaining=Math.max(DAILY_GOAL-todaySteps,0);

  donutChart.data.datasets[0].data=[
    Math.min(todaySteps,DAILY_GOAL),
    remaining
  ];
  donutChart.update();

  remainingDiv.innerHTML=
    `今日：${todaySteps}歩<br>
     目標まであと ${remaining} 歩`;
}

updateDonut();


// 📊 メイングラフ
const mainCtx=document.getElementById("mainChart").getContext("2d");
const mainChart=new Chart(mainCtx,{
  type:"bar",
  data:{labels:[],datasets:[{data:[],borderWidth:1}]},
  options:{responsive:true,scales:{y:{beginAtZero:true}}}
});

function showWeekSteps(){
  const week=getThisWeekDates();
  mainChart.data.labels=week.map(d=>d.slice(5));
  mainChart.data.datasets[0].label="今週の歩数";
  mainChart.data.datasets[0].data=
    week.map(d=>dailyData[d]||0);
  mainChart.update();
}

function showCalories(){
  const week=getThisWeekDates();
  mainChart.data.labels=week.map(d=>d.slice(5));
  mainChart.data.datasets[0].label="今週の消費カロリー(kcal)";
  mainChart.data.datasets[0].data=
    week.map(d=>(dailyData[d]||0)*CALORIE_PER_STEP);
  mainChart.update();
}

showWeekSteps();

document.getElementById("weekBtn").onclick=showWeekSteps;
document.getElementById("calorieBtn").onclick=showCalories;


// 🚶 歩数計測
document.getElementById("startBtn").onclick=async()=>{
  walking=true;
  steps=0;
  magnitudes=[];
  startTime=Date.now();

  if(typeof DeviceMotionEvent!=='undefined' &&
     typeof DeviceMotionEvent.requestPermission==='function'){
    await DeviceMotionEvent.requestPermission();
  }
};

document.getElementById("stopBtn").onclick=()=>{
  walking=false;
  dailyData[todayKey]+=steps;
  localStorage.setItem("dailySteps",
    JSON.stringify(dailyData));
  steps=0;
  updateDonut();
  showWeekSteps();
};

window.addEventListener("devicemotion",(event)=>{
  if(!walking)return;
  const acc=event.accelerationIncludingGravity;
  if(!acc)return;

  const mag=Math.sqrt(acc.x*acc.x+
                      acc.y*acc.y+
                      acc.z*acc.z);
  const now=Date.now();

  if(mag>STEP_THRESHOLD &&
     now-lastStepTime>STEP_INTERVAL){
    steps++;
    lastStepTime=now;
  }
});
</script>
</body>
</html>
