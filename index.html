<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI歩き方診断アプリ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  padding:10px;
  text-align:center;
  font-family: Arial;

  background: linear-gradient(-45deg, #4facfe, #00f2fe, #43e97b, #38f9d7);
  background-size: 400% 400%;
  animation: bgMove 10s ease infinite;
  color:#333;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.card{
  background: rgba(255,255,255,0.9);
  border-radius:18px;
  padding:15px;
  margin:12px auto;
  max-width:420px;
  box-shadow:0 6px 20px rgba(0,0,0,0.2);
}

button{
  width:100%;
  font-size:16px;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:6px;
  color:white;
  font-weight:bold;
}

#startBtn{background:#4CAF50;}
#stopBtn{background:#f44336;}

.donut-wrapper{
  position:relative;
  width:220px;
  margin:0 auto;
}

.center-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:20px;
  font-weight:bold;
}

canvas{
  width:100% !important;
  height:250px !important;
}

#result{
  margin-top:10px;
  font-size:18px;
}
</style>
</head>

<body>

<h2 style="color:white;">🚶 歩数計</h2>

<div class="card">
  <button id="startBtn">計測開始</button>
  <button id="stopBtn">計測停止</button>
</div>

<div class="card">
  <div class="donut-wrapper">
    <canvas id="donutChart"></canvas>
    <div class="center-text" id="centerText">0歩</div>
  </div>
  <div id="result">歩数：0</div>
</div>

<script>
let steps = 0;
let walking = false;
let lastStepTime = 0;

const STEP_THRESHOLD = 12;
const STEP_INTERVAL = 300;

// ===== ドーナツ =====
const donut = new Chart(document.getElementById("donutChart"), {
  type: "doughnut",
  data: {
    datasets: [{
      data: [0, 9000],
      backgroundColor: ["#4CAF50", "#ddd"]
    }]
  },
  options: {
    cutout: "70%",
    plugins: { legend: { display: false } }
  }
});

function updateUI(){
  document.getElementById("centerText").innerText = steps + "歩";
  document.getElementById("result").innerText = "歩数：" + steps;

  donut.data.datasets[0].data = [steps, Math.max(9000 - steps, 0)];
  donut.update();
}

// ===== 計測開始（iPhone対応） =====
document.getElementById("startBtn").onclick = async () => {

  // iPhone用 許可
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {

    const permission = await DeviceMotionEvent.requestPermission();

    if (permission !== 'granted') {
      alert("センサーの許可が必要です");
      return;
    }
  }

  walking = true;
  steps = 0;

  alert("計測スタート！");
};

// ===== 停止 =====
document.getElementById("stopBtn").onclick = () => {
  walking = false;
  alert("停止しました");
};

// ===== センサー =====
window.addEventListener("devicemotion", (event) => {
  if (!walking) return;

  const acc = event.accelerationIncludingGravity;
  if (!acc) return;

  const magnitude = Math.sqrt(acc.x*acc.x + acc.y*acc.y + acc.z*acc.z);
  const now = Date.now();

  if (magnitude > STEP_THRESHOLD && now - lastStepTime > STEP_INTERVAL) {
    steps++;
    lastStepTime = now;
    updateUI();
  }
});
</script>

</body>
</html>
