<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI歩き方診断 完全版</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  padding:10px;
  text-align:center;
  font-family: Arial;
  background: linear-gradient(-45deg,#4facfe,#00f2fe,#43e97b,#38f9d7);
  background-size:400% 400%;
  animation:bg 10s ease infinite;
}
@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}
.card{
  background:white;
  border-radius:15px;
  padding:15px;
  margin:10px auto;
  max-width:420px;
}
.donut-wrap{
  position:relative;
  width:200px;
  margin:0 auto;
}
.center-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:20px;
  font-weight:bold;
}
button,select{
  width:100%;
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
}
button{color:white;}
#startBtn{background:#4CAF50;}
#stopBtn{background:#f44336;}
#weekBtn{background:#2196F3;}
#calBtn{background:#ff9800;}
#monthBtn{background:#9c27b0;}
</style>
</head>

<body>

<h2>🚶 AI歩数アプリ（完成版）</h2>

<div class="card">
<button id="startBtn">計測開始</button>
<button id="stopBtn">計測停止</button>
</div>

<div class="card">
<h3>今日の進捗</h3>

<div class="donut-wrap">
<canvas id="donutChart"></canvas>
<div class="center-text" id="centerText">0歩</div>
</div>

<p id="remaining"></p>
<p id="analysis"></p>
</div>

<div class="card">
<button id="weekBtn">週歩数</button>
<button id="calBtn">カロリー</button>
<select id="monthSelect"></select>
<button id="monthBtn">月グラフ</button>

<canvas id="chart"></canvas>
</div>

<script>
const GOAL = 9000;
let steps=0, walking=false, lastStep=0, startTime=0;

let data=JSON.parse(localStorage.getItem("steps"))||{};
const today=new Date().toISOString().slice(0,10);
if(!data[today]) data[today]=0;

// ===== ドーナツ =====
const donut=new Chart(document.getElementById("donutChart"),{
 type:"doughnut",
 data:{datasets:[{
   data:[0,GOAL],
   backgroundColor:["#4CAF50","#ddd"]
 }]},
 options:{
   cutout:"70%",
   plugins:{legend:{display:false}}
 }
});

function updateDonut(){
 const total=data[today] + steps; // ←リアルタイム反映
 const remain=Math.max(GOAL-total,0);

 donut.data.datasets[0].data=[Math.min(total,GOAL),remain];
 donut.update();

 document.getElementById("centerText").innerText=total+"歩";
 document.getElementById("remaining").innerText="あと "+remain+" 歩";
}

// ===== 月選択 =====
function initMonth(){
 const select=document.getElementById("monthSelect");
 const keys=Object.keys(data);
 const months=[...new Set(keys.map(k=>k.slice(0,7)))];
 months.sort().reverse();

 months.forEach(m=>{
   const o=document.createElement("option");
   o.value=m;
   o.textContent=m;
   select.appendChild(o);
 });
}

// ===== グラフ =====
const chart=new Chart(document.getElementById("chart"),{
 type:"bar",
 data:{labels:[],datasets:[{label:"歩数",data:[]}]}
});

function getWeek(){
 let arr=[];
 for(let i=6;i>=0;i--){
   let d=new Date();
   d.setDate(d.getDate()-i);
   arr.push(d.toISOString().slice(0,10));
 }
 return arr;
}

function showWeek(){
 const w=getWeek();
 chart.data.labels=w.map(d=>d.slice(5));
 chart.data.datasets[0].label="歩数";
 chart.data.datasets[0].data=w.map(d=>data[d]||0);
 chart.update();
}

function showCal(){
 const w=getWeek();
 chart.data.labels=w.map(d=>d.slice(5));
 chart.data.datasets[0].label="カロリー";
 chart.data.datasets[0].data=w.map(d=>(data[d]||0)*0.04);
 chart.update();
}

function showMonth(){
 const m=document.getElementById("monthSelect").value;
 const days=new Date(m.split("-")[0],m.split("-")[1],0).getDate();

 let labels=[],vals=[];
 for(let i=1;i<=days;i++){
   let d=m+"-"+String(i).padStart(2,'0');
   labels.push(i);
   vals.push(data[d]||0);
 }

 chart.data.labels=labels;
 chart.data.datasets[0].label="月歩数";
 chart.data.datasets[0].data=vals;
 chart.update();
}

// ===== iPhone対応 =====
document.getElementById("startBtn").onclick=async()=>{
 if(typeof DeviceMotionEvent!=='undefined' &&
    typeof DeviceMotionEvent.requestPermission==='function'){
   const p=await DeviceMotionEvent.requestPermission();
   if(p!=='granted'){alert("許可必要");return;}
 }
 walking=true;
 steps=0;
 startTime=Date.now();
};

document.getElementById("stopBtn").onclick=()=>{
 walking=false;
 data[today]+=steps;
 localStorage.setItem("steps",JSON.stringify(data));
 updateDonut();
 showWeek();
 analyze();
};

// ===== センサー =====
window.addEventListener("devicemotion",(e)=>{
 if(!walking)return;
 const a=e.accelerationIncludingGravity;
 if(!a)return;

 const mag=Math.sqrt(a.x*a.x+a.y*a.y+a.z*a.z);
 const now=Date.now();

 if(mag>12 && now-lastStep>300){
   steps++;
   lastStep=now;

   updateDonut(); // ←追加
   analyze();     // ←追加
 }
});

// ===== AI分析（強化版） =====
function analyze(){
 const todaySteps = data[today] + steps;

 // 前日
 const keys = Object.keys(data).sort();
 const yesterday = keys.length > 1 ? data[keys[keys.length-2]] : todaySteps;

 // 週間平均
 const week = getWeek();
 const weeklyAvg = week.reduce((s,d)=>s+(data[d]||0),0)/week.length;

 // ペース
 const time = (Date.now()-startTime)/60000;
 const cadence = steps/(time||1);

 let msg="";

 // ペース
 if(cadence>120) msg+="かなり速いペースで歩けています。";
 else if(cadence>90) msg+="良いペースで歩けています。";
 else msg+="ややゆっくりなペースです。";

 // 前日比較
 if(todaySteps>yesterday) msg+=" 昨日より活動量が増えています。";
 else if(todaySteps<yesterday) msg+=" 昨日より活動量が減少しています。";
 else msg+=" 昨日と同程度です。";

 // 平均比較
 if(todaySteps>weeklyAvg) msg+=" 今週平均を上回っています。";
 else msg+=" 今週平均を下回っています。";

 // 目標
 const rate=todaySteps/GOAL;
 if(rate>=1) msg+=" 目標達成です！素晴らしいです。";
 else if(rate>=0.7) msg+=` 目標まであと${GOAL-todaySteps}歩です。`;
 else msg+=" もう少し歩くとさらに良くなります。";

 document.getElementById("analysis").innerText=msg;
}

// ===== ボタン =====
document.getElementById("weekBtn").onclick=showWeek;
document.getElementById("calBtn").onclick=showCal;
document.getElementById("monthBtn").onclick=showMonth;

// 初期化
initMonth();
updateDonut();
showWeek();
</script>

</body>
</html>
