<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>歩数計Webアプリ</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    margin-top: 50px;
    background-color: #f2f2f2;
}

button {
    font-size: 20px;
    padding: 10px 20px;
    margin-top: 20px;
}

#steps {
    font-size: 50px;
    margin-top: 30px;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>歩数計</h1>

<button onclick="start()">開始</button>

<div id="steps">0 歩</div>

<script>

let stepCount = 0;
let lastMagnitude = 0;
let threshold = 1.2;
let lastStepTime = 0;

function start() {

    if (typeof DeviceMotionEvent.requestPermission === 'function') {

        DeviceMotionEvent.requestPermission()
        .then(permissionState => {
            if (permissionState === 'granted') {
                window.addEventListener('devicemotion', countSteps);
            }
        })
        .catch(console.error);

    } else {
        window.addEventListener('devicemotion', countSteps);
    }
}

function countSteps(event) {

    let acc = event.accelerationIncludingGravity;

    if (!acc) return;

    let magnitude = Math.sqrt(
        acc.x * acc.x +
        acc.y * acc.y +
        acc.z * acc.z
    );

    let diff = magnitude - lastMagnitude;

    let now = Date.now();

    // 0.4秒以上空けないとカウントしない（誤検出防止）
    if (diff > threshold && (now - lastStepTime) > 400) {
        stepCount++;
        document.getElementById("steps").innerText = stepCount + " 歩";
        lastStepTime = now;
    }

    lastMagnitude = magnitude;
}

</script>

</body>
</html>
