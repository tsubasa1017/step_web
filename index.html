<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>AI歩き方診断（日別累計＋目標バー）</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    button {
      font-size: 22px;
      padding: 18px 40px;
      margin: 10px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
    }

    #startBtn { background: #4CAF50; color: white; }
    #stopBtn { background: #f44336; color: white; }

    #result {
      font-size: 22px;
      margin-top: 20px;
    }

    .progress-container {
      width: 80%;
      height: 30px;
      background: #ddd;
      border-radius: 20px;
      margin: 20px auto;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #4CAF50;
      text-align: center;
      line-height: 30px;
      color: white;
      font-weight: bold;
      transition: width 0.3s;
    }

    canvas {
      margin-top: 30px;
      background: white;
      border-radius: 12px;
      padding: 10px;
    }
  </style>
</head>
<body>

  <h1>AI歩き方診断（日別累計＋目標9000歩）</h1>

  <button id="startBtn">計測開始</button>
  <button id="stopBtn">計測停止</button>

  <div id="result">今日の歩数：0歩</div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar">0%</div>
  </div>

  <canvas id="stepChart" width="400" height="200"></canvas>

  <script>
    const DAILY_GOAL = 9000;

    let steps = 0;
    let walking = false;
    let lastStepTime = 0;
    const STEP_THRESHOLD = 12;
    const STEP_INTERVAL = 300;

    function getTodayKey() {
      const today = new Date();
      return today.getFullYear() + "-" +
             String(today.getMonth()+1).padStart(2,'0') + "-" +
             String(today.getDate()).padStart(2,'0');
    }

    let dailyData = JSON.parse(localStorage.getItem("dailySteps")) || {};
    const todayKey = getTodayKey();

    if (!dailyData[todayKey]) {
      dailyData[todayKey] = 0;
    }

    const resultDiv = document.getElementById("result");
    const progressBar = document.getElementById("progressBar");

    function updateUI() {
      const todaySteps = dailyData[todayKey];
      resultDiv.innerText = `今日の歩数：${todaySteps}歩`;

      let percent = Math.min((todaySteps / DAILY_GOAL) * 100, 100);
      progressBar.style.width = percent + "%";
      progressBar.innerText = Math.floor(percent) + "%";

      if (percent >= 100) {
        progressBar.style.background = "#2196F3";
      } else {
        progressBar.style.background = "#4CAF50";
      }
    }

    updateUI();

    const ctx = document.getElementById('stepChart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: Object.keys(dailyData),
        datasets: [{
          label: '日別歩数',
          data: Object.values(dailyData),
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: { beginAtZero: true }
        }
      }
    });

    document.getElementById("startBtn").onclick = async () => {
      walking = true;

      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        await DeviceMotionEvent.requestPermission();
      }

      resultDiv.innerText = "計測中...";
    };

    document.getElementById("stopBtn").onclick = () => {
      walking = false;

      dailyData[todayKey] += steps;
      localStorage.setItem("dailySteps", JSON.stringify(dailyData));

      steps = 0;
      updateUI();
      updateGraph();
    };

    window.addEventListener("devicemotion", (event) => {
      if (!walking) return;

      const acc = event.accelerationIncludingGravity;
      if (!acc) return;

      const magnitude = Math.sqrt(
        acc.x * acc.x + acc.y * acc.y + acc.z * acc.z
      );

      const now = Date.now();

      if (magnitude > STEP_THRESHOLD &&
          now - lastStepTime > STEP_INTERVAL) {
        steps++;
        lastStepTime = now;
      }
    });

    function updateGraph() {
      chart.data.labels = Object.keys(dailyData);
      chart.data.datasets[0].data = Object.values(dailyData);
      chart.update();
    }
  </script>

</body>
</html>
