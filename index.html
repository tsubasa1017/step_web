<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>歩数計</title>
</head>

<body>

<h1>歩数計</h1>

<p>歩数: <span id="step">0</span></p>

<button onclick="start()">開始</button>
<button onclick="stop()">停止</button>

<script>
let steps = 0;
let intervalId = null;

function start() {
    if (intervalId === null) {
        intervalId = setInterval(() => {
            steps++;
            document.getElementById("step").textContent = steps;
        }, 1000);
    }
}

function stop() {
    clearInterval(intervalId);
    intervalId = null;
}
</script>

</body>
</html>
