<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI歩き方診断</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  padding:10px;
  text-align:center;
  font-family: Arial;
  background: linear-gradient(-45deg,#4facfe,#00f2fe,#43e97b,#38f9d7);
  background-size:400% 400%;
  animation:bg 10s ease infinite;
}
@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}
.card{
  background:white;
  border-radius:15px;
  padding:15px;
  margin:10px auto;
  max-width:400px;
}
button{
  width:100%;
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  color:white;
}
#startBtn{background:green;}
#stopBtn{background:red;}
#weekBtn{background:blue;}
</style>
</head>

<body>

<h2>🚶 AI歩数アプリ</h2>

<div class="card">
<button id="startBtn">開始</button>
<button id="stopBtn">停止</button>
</div>

<div class="card">
<p id="result">歩数：0</p>
<p id="analysis"></p>
</div>

<div class="card">
<button id="weekBtn">週グラフ</button>
<canvas id="chart"></canvas>
</div>

<script>
let steps=0, walking=false, lastStep=0, startTime=0;
let data=JSON.parse(localStorage.getItem("steps"))||{};
const today=new Date().toISOString().slice(0,10);
if(!data[today]) data[today]=0;

// ===== グラフ =====
const chart=new Chart(document.getElementById("chart"),{
 type:"bar",
 data:{labels:[],datasets:[{label:"歩数",data:[]}]}
});

function getWeek(){
 let arr=[];
 for(let i=6;i>=0;i--){
   let d=new Date();
   d.setDate(d.getDate()-i);
   arr.push(d.toISOString().slice(0,10));
 }
 return arr;
}

function showWeek(){
 const w=getWeek();
 chart.data.labels=w.map(d=>d.slice(5));
 chart.data.datasets[0].data=w.map(d=>data[d]||0);
 chart.update();
}

// ===== iPhone対応開始 =====
document.getElementById("startBtn").onclick=async()=>{
 if(typeof DeviceMotionEvent!=='undefined' &&
    typeof DeviceMotionEvent.requestPermission==='function'){
   const p=await DeviceMotionEvent.requestPermission();
   if(p!=='granted'){
     alert("許可必要");
     return;
   }
 }
 walking=true;
 steps=0;
 startTime=Date.now();
};

// ===== 停止 =====
document.getElementById("stopBtn").onclick=()=>{
 walking=false;
 data[today]+=steps;
 localStorage.setItem("steps",JSON.stringify(data));
 showWeek();
 analyze();
};

// ===== センサー =====
window.addEventListener("devicemotion",(e)=>{
 if(!walking)return;
 const a=e.accelerationIncludingGravity;
 if(!a)return;

 const mag=Math.sqrt(a.x*a.x+a.y*a.y+a.z*a.z);
 const now=Date.now();

 if(mag>12 && now-lastStep>300){
   steps++;
   lastStep=now;
   document.getElementById("result").innerText="歩数："+steps;
 }
});

// ===== AI =====
function analyze(){
 const time=(Date.now()-startTime)/60000;
 const cadence=steps/time;

 let msg="";
 if(cadence>120) msg="速い！";
 else if(cadence>90) msg="良いペース";
 else msg="ゆっくり";

 document.getElementById("analysis").innerText=msg;
}

// 初期表示
showWeek();
</script>

</body>
</html>
